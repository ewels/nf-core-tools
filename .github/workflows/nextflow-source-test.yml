name: Test with Nextflow from source

on:
  workflow_dispatch:
  schedule:
    # Run at 00:00 UTC on Monday, Wednesday, Friday (2:00 CEST)
    - cron: "0 0 * * 1,3,5"

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-check.outputs.cache-hit }}
      nxf-sha: ${{ steps.nxf-sha.outputs.sha }}
    steps:
      - name: Get latest Nextflow commit SHA
        id: nxf-sha
        run: |
          NXF_SHA=$(git ls-remote https://github.com/nextflow-io/nextflow.git HEAD | cut -f1)
          echo "sha=$NXF_SHA" >> "$GITHUB_OUTPUT"
          echo "Latest Nextflow SHA: $NXF_SHA"

      - name: Check if already tested
        id: cache-check
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/nextflow-tested-marker
          key: nextflow-tested-${{ steps.nxf-sha.outputs.sha }}
          lookup-only: true

  test-with-nextflow-source:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.cache-hit != 'true' || github.event_name ==
      'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      NXF_ANSI_LOG: false

    steps:
      - name: Check out Nextflow
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: nextflow-io/nextflow
          path: nextflow

      - name: Check out nf-core/tools
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: dev
          path: nf-core-tools

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "temurin"
          architecture: x64
          cache: gradle
          java-version: "21"

      - name: Build Nextflow
        run: cd nextflow && make pack

      - name: Move Nextflow to local bin/
        run: |
          mkdir -p $HOME/.local/bin/
          mv nextflow/build/releases/nextflow*dist $HOME/.local/bin/nextflow
          chmod +x $HOME/.local/bin/nextflow
          nextflow -version

      - name: Install nf-core/tools
        working-directory: nf-core-tools
        run: uv sync

      - name: Create new pipeline
        working-directory: nf-core-tools
        run: >
          uv run nf-core pipelines create
            -n testpipeline
            -d "This pipeline is for testing"
            -a "Testing McTestface"
            --outdir ${{ github.workspace }}/nf-core-testpipeline

      - name: Run new pipeline
        run: nextflow run ./nf-core-testpipeline -profile docker,test --outdir ./results

      - name: Mark SHA as tested
        if: success()
        run: mkdir -p /tmp/nextflow-tested-marker && touch
          /tmp/nextflow-tested-marker/.done

      - name: Save tested marker to cache
        if: success()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/nextflow-tested-marker
          key: nextflow-tested-${{ needs.check-for-changes.outputs.nxf-sha }}

      - name: Send email on failure
        if: failure()
        uses: dsfx3d/action-aws-ses@v1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "eu-west-1"
        with:
          to: ${{ secrets.NEXTFLOW_NIGHTLY_NOTIFICATION_EMAIL_ADDRESS }}
          from: core@nf-co.re
          subject: "Nextflow source test CI failed"
          body: |
            The Nextflow source test CI workflow failed!

            See the failed run here: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
